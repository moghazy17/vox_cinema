name: Check Showtimes

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run showtime check
        env:
          CINEMA_SLUG: ${{ vars.CINEMA_SLUG }}
          MOVIE_SLUG: ${{ vars.MOVIE_SLUG }}
          TARGET_WEEKDAY: ${{ vars.TARGET_WEEKDAY }}
          TIMEZONE: ${{ vars.TIMEZONE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_showtimes.py

      - name: Commit state.json if changed
        run: |
          if ! git diff --quiet state.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notified_for state"
            git push
          else
            echo "state.json unchanged — nothing to commit"
          fi
